apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: adaptivise-engine
spec:
  template:
    spec:
      containers:
      - image: gcr.io/myfirst-a32e1/adaptivise-engine # Make sure this matches your image path
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 4Gi # Fixing your memory issue
        startupProbe:
          httpGet:
            path: /health
          initialDelaySeconds: 0
          timeoutSeconds: 3
          periodSeconds: 5
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /health
          initialDelaySeconds: 0
          timeoutSeconds: 3
          periodSeconds: 5
          failureThreshold: 3